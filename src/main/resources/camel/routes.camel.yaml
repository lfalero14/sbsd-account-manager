- route:
    id: party-directory-route
    from:
      uri: direct:party-directory
      steps:
        - setHeader:
            name: CamelHttpMethod
            constant: GET

        - setHeader:
            name: x-correlation-id
            simple: "${header.x-correlation-id}"

        - toD:
            uri: "{{endpoint.party-data.url}}/${exchangeProperty.partyId}/retrieve?bridgeEndpoint=true&throwExceptionOnFailure=false&connectTimeout={{endpoint.connect.timeout}}&socketTimeout={{endpoint.socket.timeout}}"

        - choice:
            when:
              - simple: "${header.CamelHttpResponseCode} == 200"
                steps:
                  - unmarshal:
                      json:
                        library: Jackson
                        unmarshalType: java.util.Map

                  - setProperty:
                      name: partyIdentification
                      simple: "${body[Party][PartyIdentification]}"

                  - setProperty:
                      name: partyName
                      simple: "${body[Party][PartyName]}"

                  - setProperty:
                      name: partyTelephone
                      simple: "${body[Party][ContactPoint][Telephone]}"

                  - setProperty:
                      name: partyEmail
                      simple: "${body[Party][ContactPoint][Email]}"
            otherwise:
              steps:
                - setBody:
                    constant: '{"status": 500, "title": "Internal Server Error", "detail": "Failed to retrieve party information"}'
                - setHeader:
                    name: CamelHttpResponseCode
                    constant: "500"
                - setHeader:
                    name: Content-Type
                    constant: application/json
                - stop: {}
